function renderGames(){gameList.innerHTML=registry.projects.map(project=>{const canOpen=project.enabled||project.placeholder,isLink=Boolean(project.enabled&&PAGE_PATHS[project.id]),tag=isLink?'a':'button',attributes=isLink?`href="${esc(PAGE_PATHS[project.id])}"`:`type="button" ${canOpen?'':'disabled'}`;return `<${tag} class="navItem" ${attributes} data-page="${esc(project.id)}" title="${esc(project.name)}"><span class="navIcon">${project.iconEndpoint?``:'<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>'}</span><span class="navText" data-mini-label="${esc(project.name==='敬請期待'?'期待':project.id==='hsr'?'崩壞：星穹鐵道':project.id==='genshin'?'原神':project.id==='zzz'?'絕區零':project.id==='hna'?'崩壞：因緣精靈':project.name)}"><strong>${esc(project.name)}</strong>${project.subtitle?`<small>${esc(project.subtitle)}</small>`:''}</span></${tag}>`}).join('');gameList.querySelectorAll('[data-page]').forEach(button=>button.addEventListener('click',event=>{if(button.tagName==='A')event.preventDefault();navigate(button.dataset.page)}));renderMobileGames();updateActive()}
function renderMobileGames(){mobileGameList.innerHTML=registry.projects.map(project=>{const canOpen=Boolean(project.enabled||project.placeholder),icon=project.iconEndpoint?``:'<span class="mobileGameFallback">＋</span>';return `<button class="mobileGameChoice${project.id===currentPage?' active':''}" type="button" data-mobile-page="${esc(project.id)}" ${canOpen?'':'disabled'}>${icon}<span class="mobileGameChoiceText"><strong>${esc(project.name)}</strong><small>${esc(project.subtitle||'尚未開放')}</small></span></button>`}).join('');mobileGameList.querySelectorAll('[data-mobile-page]').forEach(button=>button.addEventListener('click',()=>{mobileGameSheet.close();navigate(button.dataset.mobilePage)}))}
function updateMobileHeader(){const project=projectById(currentPage),labels={home:['遊戲成就紀錄器','選擇遊戲'],redeem:['兌換碼','查看遊戲兌換碼'],account:['帳號設定',currentUser?.username||'登入與帳號管理'],admin:['後台管理','系統與成就管理']},entry=project?[project.name,project.subtitle||'成就紀錄器']:(labels[currentPage]||['遊戲成就紀錄器','手機版']),canChooseGame=Boolean(project||currentPage==='home');mobileCurrentTitle.textContent=entry[0];mobileCurrentSubtitle.textContent=entry[1];if(mobileCurrentIcon){mobileCurrentIcon.hidden=true;mobileCurrentIcon.removeAttribute('src')}mobileCurrentPageBtn.disabled=!canChooseGame;mobileCurrentPageBtn.setAttribute('aria-label',canChooseGame?'選擇遊戲':entry[0])}
function updateActive(){gameList.querySelectorAll('[data-page]').forEach(button=>button.classList.toggle('active',button.dataset.page===currentPage));homeBtn.classList.toggle('active',currentPage==='home');redeemBtn.classList.toggle('active',currentPage==='redeem');accountBtn.classList.toggle('active',currentPage==='account');adminBtn.classList.toggle('active',currentPage==='admin');mobileHomeNav.classList.toggle('active',currentPage==='home');mobileRedeemNav.classList.toggle('active',currentPage==='redeem');mobileAdminNav.classList.toggle('active',currentPage==='admin');mobileAccountNav.classList.toggle('active',currentPage==='account');renderMobileGames();updateMobileHeader()}
function closeMobile(){if(innerWidth<=760)hub.classList.remove('mobileOpen')}
function updateBrowserPath(page,replace=false){const target=PAGE_PATHS[page]||PAGE_PATHS.home;let query='';if(page==='account'||page==='redeem'){const source=new URLSearchParams(location.search),kept=new URLSearchParams(),keys=page==='account'?['verify_token','reset_token','message']:['game','code'];for(const key of keys)if(source.has(key))kept.set(key,source.get(key));const value=kept.toString();if(value)query='?'+value}const next=target+query;if(location.pathname+location.search!==next)history[replace?'replaceState':'pushState']({page},'',next)}
function loadPage(page,{replace=false,historyEvent=false}={}){if(!PAGE_PATHS[page])page='home';if(!['home','account','admin','redeem'].includes(page)&&!projectById(page))page=registry.projects.find(item=>item.enabled)?.id||'wuwa';currentPage=page;hub.classList.remove('frameFocus');try{localStorage.setItem('achievement_hub_last_page',page);if(!['home','account','admin','redeem'].includes(page))localStorage.setItem('achievement_hub_last_game',page)}catch{}if(!historyEvent)updateBrowserPath(page,replace);updateActive();updateSeo(page);closeMobile();loading.classList.remove('hidden');const src=projectSource(page);if(!src){loading.textContent='找不到此頁面。';return}loading.textContent='正在載入頁面……';frame.src=src}
function navigate(page){loadPage(page)}
function postFrame(type,payload={}){try{frame.contentWindow?.postMessage({type,...payload,at:Date.now()},location.origin)}catch{}}
function activateFrame(){try{frame.contentWindow?.focus()}catch{}postFrame('achievement-hub-activate')}
async function apiJson(path,options={}){const config={credentials:'same-origin',cache:'no-store',...options};config.headers={'Content-Type':'application/json',...(options.headers||{})};const response=await fetch(path,config);let value=null;try{value=await response.json()}catch{}if(!response.ok)throw new Error(value?.detail||value?.message||`請求失敗（${response.status}）`);return value||{}}
async function loadRegistry(){try{const value=await apiJson('/api/game-projects');if(value&&Array.isArray(value.projects))registry=value}catch{}renderGames();loadPage(pageFromLocation(),{replace:normalizedPath()==='/'})}
function syncMobileAccountAccess(logged,isAdmin){mobileNotificationBtn.hidden=!logged;mobileSupportNav.hidden=!logged;mobileAdminNav.hidden=!isAdmin;mobileBottomNav.classList.toggle('signedOut',!logged);mobileBottomNav.classList.toggle('adminHidden',logged&&!isAdmin);updateMobileHeader()}
async function loadAccount(){try{const value=await apiJson('/api/auth/me');const logged=Boolean(value.authenticated);currentUser=logged?value.user:null;const isAdmin=Boolean(logged&&currentUser?.role==='admin');loginBtn.hidden=logged;logoutBtn.hidden=!logged;supportBtn.hidden=!logged;notificationHubBtn.hidden=!logged;adminBtn.hidden=!isAdmin;syncMobileAccountAccess(logged,isAdmin);if(logged)loadHubNotifications(true);else{hubNotifications=[];renderHubNotificationBadge();if(notificationHubDialog.open)notificationHubDialog.close()}accountStatus.textContent=logged?(currentUser?.username||currentUser?.email||'帳號已登入'):'登入、註冊與帳號管理';if(!logged&&supportDialog.open)supportDialog.close();return currentUser}catch{currentUser=null;loginBtn.hidden=false;logoutBtn.hidden=true;supportBtn.hidden=true;notificationHubBtn.hidden=true;adminBtn.hidden=true;syncMobileAccountAccess(false,false);hubNotifications=[];renderHubNotificationBadge();accountStatus.textContent='帳號服務未連線';if(supportDialog.open)supportDialog.close();return null}}
function notifyAuth(){const at=Date.now();try{authChannel?.postMessage({type:'achievement-auth-changed',at})}catch{}try{localStorage.setItem('achievement_auth_changed_at',String(at))}catch{}postFrame('achievement-hub-auth-changed')}
async function logout(){logoutBtn.disabled=true;const original=logoutBtn.textContent;logoutBtn.textContent='登出中…';try{await apiJson('/api/auth/logout',{method:'POST',body:'{}'});currentUser=null;if(supportDialog.open)supportDialog.close();loginBtn.hidden=false;logoutBtn.hidden=true;supportBtn.hidden=true;notificationHubBtn.hidden=true;adminBtn.hidden=true;hubNotifications=[];renderHubNotificationBadge();accountStatus.textContent='登入、註冊與帳號管理';notifyAuth();loadPage('account',{replace:true});loadAccount()}catch(error){alert('登出失敗：'+error.message)}finally{logoutBtn.disabled=false;logoutBtn.textContent=original}}
function renderHubNotificationBadge(){const unread=hubNotifications.filter(item=>!item.is_read).length;notificationHubBadge.hidden=!unread;notificationHubBadge.textContent=unread>99?'99+':String(unread);mobileNotificationBadge.hidden=!unread;mobileNotificationBadge.textContent=unread>99?'99+':String(unread)}
function renderHubNotificationItem(item){return `<article class="notificationCard ${item.is_read?'':'unread'}"><div class="notificationCardHead"><h4>${esc(item.title)}<span class="messageTypeBadge">通知</span>${item.is_read?'':' <span class="supportStatusBadge">未讀</span>'}</h4></div><div class="announcementDetails"><p>${esc(item.body)}</p><div class="notificationMeta">${esc(formatSupportDate(Number(item.created_at||0)*1000))}｜${esc(item.kind||'info')}</div><div class="notificationItemActions">${item.link?`<a class="notificationLink" href="${esc(item.link)}" data-notification-link="${esc(item.link)}">前往</a>`:''}${item.is_read?'':`<button class="supportSecondary readHubNotification" data-id="${esc(item.id)}" type="button">標為已讀</button>`}</div></div></article>`}
function hubAnnouncementActions(item){return item.link?`<a class="notificationLink" href="${esc(item.link)}" data-notification-link="${esc(item.link)}">前往</a>`:''}
async function markHubAnnouncementRead(item){const row=hubNotifications.find(value=>value.id===item?.id);if(!row||row.item_type!=='announcement'||row.is_read)return;row.is_read=1;item.is_read=1;const root=document.getElementById('hubAnnouncementReader'),button=[...(root?.querySelectorAll('[data-announcement-reader-id]')||[])].find(value=>value.dataset.announcementReaderId===row.id);button?.classList.remove('unread');renderHubNotificationBadge();try{await apiJson(`/api/message-center/${encodeURIComponent(row.id)}/read`,{method:'POST',body:'{}'})}catch(error){row.is_read=0;item.is_read=0;button?.classList.add('unread');renderHubNotificationBadge();alert(error.message)}}
function renderHubAnnouncementReader(rows){const root=document.getElementById('hubAnnouncementReader');if(!root)return;AnnouncementReader.render(root,rows,{showUnread:true,formatDate:value=>formatSupportDate(Number(value||0)*1000),actions:hubAnnouncementActions,onSelect:markHubAnnouncementRead,emptyText:'目前沒有公告。'})}
function renderHubNotifications(){const rows=hubNotifications.filter(item=>activeMessageType==='all'||item.item_type===activeMessageType),announcements=rows.filter(item=>item.item_type==='announcement'),notifications=rows.filter(item=>item.item_type!=='announcement');if(!rows.length)notificationHubList.innerHTML=`<div class="supportEmpty">目前沒有${activeMessageType==='announcement'?'公告':activeMessageType==='notification'?'通知':'訊息'}。</div>`;else if(activeMessageType==='notification')notificationHubList.innerHTML=notifications.map(renderHubNotificationItem).join('');else{notificationHubList.innerHTML=`${announcements.length?`<section class="messageHubAnnouncementBlock">${activeMessageType==='all'?'<h3>公告</h3>':''}<div id="hubAnnouncementReader"></div></section>`:''}${notifications.length?`<section class="messageHubNotificationBlock"><h3>通知</h3>${notifications.map(renderHubNotificationItem).join('')}</section>`:''}`;renderHubAnnouncementReader(announcements)}document.querySelectorAll('.messageHubTab').forEach(button=>button.classList.toggle('active',button.dataset.messageType===activeMessageType))}
async function loadHubNotifications(silent=false){if(!currentUser){hubNotifications=[];renderHubNotificationBadge();return}try{const result=await apiJson('/api/message-center');hubNotifications=result.items||[];renderHubNotificationBadge();if(notificationHubDialog.open)renderHubNotifications()}catch(error){if(!silent)alert(error.message)}}
function syncNotificationHubDialogWidth(){const width=Math.max(0,frame.getBoundingClientRect().width-32);document.documentElement.style.setProperty('--notification-hub-dialog-width',`${width}px`)}
async function openHubNotifications(){if(!currentUser)return navigate('account');await loadHubNotifications();renderHubNotifications();syncNotificationHubDialogWidth();notificationHubDialog.showModal();closeMobile()}
function formatSupportDate(value){if(!value)return'—';const date=new Date(value);if(Number.isNaN(date.getTime()))return String(value);return new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(date)}
function supportStatusText(status){return({pending:'等待處理',open:'處理中',resolved:'已解決',closed:'已結案'})[status]||status||'未知'}
function renderSupportMessages(messages){return `<div class="supportThread">${(messages||[]).map(message=>`<div class="supportMessage ${message.sender_role==='admin'?'adminReply':''}"><div class="supportMessageMeta">${esc(message.sender_role==='admin'?'管理員':(message.sender_email||'使用者'))}｜${esc(formatSupportDate(message.created_at))}</div><p>${esc(message.message)}</p></div>`).join('')}</div>`}
function renderSupportTicket(ticket){const done=ticket.status==='resolved'||ticket.status==='closed';return `<article class="supportTicket" data-ticket-id="${esc(ticket.id)}"><h4>${esc(ticket.subject)} <span class="supportStatusBadge ${done?'ok':''}">${esc(supportStatusText(ticket.status))}</span></h4>${renderSupportMessages(ticket.messages)}<div class="supportReply"><input class="supportInput ticketUserReplyText" placeholder="補充說明"><button class="supportSecondary ticketUserReply" type="button">送出回覆</button><button class="supportDanger ticketUserDelete" type="button">刪除客服單</button></div></article>`}
function setSupportNotice(message='',isError=false){supportNotice.textContent=message;supportNotice.hidden=!message;supportNotice.style.borderColor=isError?'rgba(255,105,120,.35)':'';supportNotice.style.color=isError?'#ffbdc4':''}
async function loadMySupport(){if(!currentUser){mySupportList.innerHTML='<div class="supportError">請先登入後再使用問題回報。</div>';return}supportLoading=true;mySupportList.innerHTML='<div class="supportBusy">正在載入客服單……</div>';try{const result=await apiJson('/api/support/tickets');const rows=result.tickets||[];mySupportList.innerHTML=rows.length?rows.map(renderSupportTicket).join(''):'<div class="supportEmpty">尚未建立客服單。</div>';setSupportNotice('')}catch(error){mySupportList.innerHTML=`<div class="supportError">${esc(error.message)}</div>`;setSupportNotice('客服單載入失敗，請稍後再試。',true)}finally{supportLoading=false}}
async function openSupport(){const user=currentUser||await loadAccount();if(!user){navigate('account');return}closeMobile();setSupportNotice('');if(!supportDialog.open)supportDialog.showModal();await loadMySupport();requestAnimationFrame(()=>supportSubject.focus())}
function closeSupport(){if(supportDialog.open)supportDialog.close();setSupportNotice('');try{frame.contentWindow?.focus()}catch{}}
supportCreateForm.addEventListener('submit',async event=>{event.preventDefault();if(supportLoading)return;const subject=supportSubject.value.trim(),message=supportMessage.value.trim();if(!subject||!message)return;supportSubmitBtn.disabled=true;setSupportNotice('正在送出客服單……');try{await apiJson('/api/support/tickets',{method:'POST',body:JSON.stringify({subject,message})});supportCreateForm.reset();setSupportNotice('客服單已送出。');await loadMySupport()}catch(error){setSupportNotice(error.message,true)}finally{supportSubmitBtn.disabled=false}})
mySupportList.addEventListener('click',async event=>{const reply=event.target.closest('.ticketUserReply'),remove=event.target.closest('.ticketUserDelete');if(!reply&&!remove)return;const button=reply||remove,card=button.closest('[data-ticket-id]'),id=card?.dataset.ticketId;if(!id)return;if(remove&&!confirm('確定永久刪除此客服單及全部對話嗎？'))return;button.disabled=true;try{if(remove)await apiJson(`/api/support/tickets/${encodeURIComponent(id)}`,{method:'DELETE',body:'{}'});else{const input=card.querySelector('.ticketUserReplyText'),message=input.value.trim();if(!message)return;await apiJson(`/api/support/tickets/${encodeURIComponent(id)}/reply`,{method:'POST',body:JSON.stringify({message})})}await loadMySupport()}catch(error){setSupportNotice(error.message,true)}finally{button.disabled=false}})
frame.addEventListener('load',()=>{loadAccount();if(!(currentPage==='account'&&hasAuthActionQuery()))activateFrame();setTimeout(()=>loading.classList.add('hidden'),0)});
window.addEventListener('message',event=>{if(event.origin!==location.origin)return;const data=event.data||{};if(data.type==='achievement-hub-focus-mode'){hub.classList.toggle('frameFocus',Boolean(data.enabled));if(data.enabled)closeMobile()}if(data.type==='achievement-hub-auth-changed')loadAccount();if(data.type==='achievement-hub-clear-auth-query')clearAuthActionQuery();if(data.type==='achievement-hub-open-account')navigate('account');if(data.type==='achievement-hub-open-game'&&PAGE_PATHS[data.gameId])navigate(data.gameId);if(data.type==='achievement-hub-open-admin')navigate('admin');if(data.type==='achievement-hub-open-support')openSupport();if(data.type==='achievement-hub:navigate'){if(data.gameId)localStorage.setItem('achievement_admin_game',String(data.gameId));if(data.tab)localStorage.setItem('achievement_admin_open_tab',String(data.tab));if(PAGE_PATHS[data.page])navigate(String(data.page))}});
window.addEventListener('popstate',()=>loadPage(pageFromLocation(),{historyEvent:true}));window.addEventListener('focus',loadAccount);document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadAccount()});window.addEventListener('storage',event=>{if(event.key==='achievement_auth_changed_at'){loadAccount();if(supportDialog.open)loadMySupport()}});authChannel?.addEventListener('message',()=>{loadAccount();if(supportDialog.open)loadMySupport()});
notificationHubBtn.addEventListener('click',openHubNotifications);closeNotificationHubBtn.addEventListener('click',()=>notificationHubDialog.close());document.querySelectorAll('.messageHubTab').forEach(button=>button.addEventListener('click',()=>{activeMessageType=button.dataset.messageType||'all';renderHubNotifications()}));markAllNotificationHubBtn.addEventListener('click',async()=>{await apiJson(`/api/message-center/read-all?item_type=${encodeURIComponent(activeMessageType)}`,{method:'POST',body:'{}'});await loadHubNotifications()});notificationHubList.addEventListener('click',async event=>{const read=event.target.closest('.readHubNotification'),link=event.target.closest('[data-notification-link]');if(link){event.preventDefault();const href=link.dataset.notificationLink||'';notificationHubDialog.close();if(href.startsWith('/_projects/')){const match=href.match(/\/_projects\/([^/]+)/);if(match&&PAGE_PATHS[match[1]])navigate(match[1]);else location.href=href}else location.href=href;return}const id=read?.dataset.id;if(!id)return;await apiJson(`/api/message-center/${encodeURIComponent(id)}/read`,{method:'POST',body:'{}'});await loadHubNotifications()});
homeBtn.addEventListener('click',event=>{event.preventDefault();navigate('home')});redeemBtn.addEventListener('click',event=>{event.preventDefault();navigate('redeem')});accountBtn.addEventListener('click',()=>navigate('account'));adminBtn.addEventListener('click',()=>navigate('admin'));supportBtn.addEventListener('click',openSupport);loginBtn.addEventListener('click',()=>navigate('account'));logoutBtn.addEventListener('click',logout);closeSupportBtn.addEventListener('click',closeSupport);supportDialog.addEventListener('cancel',event=>{event.preventDefault();closeSupport()});supportDialog.addEventListener('click',event=>{if(event.target===supportDialog)closeSupport()});
document.getElementById('toggle').addEventListener('click',()=>{if(innerWidth<=760)hub.classList.toggle('mobileOpen');else{hub.classList.toggle('collapsed');try{localStorage.setItem('achievement_hub_sidebar_collapsed',hub.classList.contains('collapsed')?'1':'0')}catch{}}});document.getElementById('mobileMenu').addEventListener('click',()=>hub.classList.add('mobileOpen'));document.getElementById('backdrop').addEventListener('click',()=>hub.classList.remove('mobileOpen'));try{if(localStorage.getItem('achievement_hub_sidebar_collapsed')==='1')hub.classList.add('collapsed')}catch{}
function openMobileGameSheet(){if(currentPage!=='home'&&!projectById(currentPage))return;renderMobileGames();if(!mobileGameSheet.open)mobileGameSheet.showModal()}
mobileCurrentPageBtn.addEventListener('click',openMobileGameSheet);closeMobileGameSheetBtn.addEventListener('click',()=>mobileGameSheet.close());mobileHomeNav.addEventListener('click',()=>navigate('home'));mobileSupportNav.addEventListener('click',openSupport);mobileRedeemNav.addEventListener('click',()=>navigate('redeem'));mobileAdminNav.addEventListener('click',()=>navigate('admin'));mobileAccountNav.addEventListener('click',()=>navigate('account'));mobileNotificationBtn.addEventListener('click',openHubNotifications);
const notificationHubWidthObserver=new ResizeObserver(syncNotificationHubDialogWidth);notificationHubWidthObserver.observe(frame);syncNotificationHubDialogWidth();
let mobileLayoutState=isMobileLayout();matchMedia('(max-width:760px)').addEventListener('change',event=>{if(Boolean(event.matches)===mobileLayoutState)return;mobileLayoutState=Boolean(event.matches);loadPage(currentPage,{replace:true,historyEvent:true})});
loadRegistry();loadAccount();setInterval(()=>{loadAccount();if(currentUser)loadHubNotifications(true)},30000);
