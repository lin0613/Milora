<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex,follow">
<title>遊戲成就紀錄器</title>
<style>
:root{--bg:#071019;--text:#edf6fb;--muted:#91a5b5;--line:rgba(143,174,202,.2)}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,"Noto Sans TC","Microsoft JhengHei",sans-serif}
body{min-height:100vh;min-height:100dvh}
.home{position:relative;width:100%;height:100%;min-height:360px;overflow:hidden;isolation:isolate}
.motionField{position:absolute;z-index:1;inset:0;overflow:hidden;pointer-events:none}
.gameIcon{position:absolute;left:0;top:0;width:64px;height:64px;border:1px solid var(--line);border-radius:14px;background:#0d1822;object-fit:cover;opacity:.82;box-shadow:0 12px 30px rgba(0,0,0,.32);will-change:transform}
.intro{position:absolute;z-index:3;left:50%;top:50%;width:min(680px,calc(100% - 64px));transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.intro h1{margin:0;color:var(--text);font-size:44px;font-weight:900;line-height:1.2;letter-spacing:0;text-shadow:0 3px 18px #071019,0 0 5px #071019}
.intro p{margin:16px 0 0;color:#b9cad6;font-size:18px;font-weight:700;line-height:1.7;letter-spacing:0;text-shadow:0 2px 14px #071019,0 0 5px #071019}
@media(max-width:760px){.home{min-height:240px}.gameIcon{border-radius:11px}.intro{width:calc(100% - 40px)}.intro h1{font-size:30px}.intro p{margin-top:12px;font-size:14px}}
</style>
</head>
<body>
<main class="home" aria-labelledby="homeTitle">
 <div class="motionField" id="motionField" aria-hidden="true"></div>
 <section class="intro" id="intro">
  <h1 id="homeTitle">遊戲成就紀錄器</h1>
  <p>一個自製的遊戲成就紀錄器</p>
 </section>
</main>
<script>
const field=document.getElementById('motionField');
const intro=document.getElementById('intro');
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
let sprites=[];
let frameId=0;
let previousTime=performance.now();

function iconSize(count){
 const mobile=matchMedia('(max-width:760px)').matches;
 if(mobile)return count>12?38:count>8?42:48;
 return count>16?46:count>10?52:count>7?58:68;
}

function randomSpritePosition(sprite,width,height,placed){
 const maxX=Math.max(0,width-sprite.size);
 const maxY=Math.max(0,height-sprite.size);
 const attempts=Math.max(72,sprites.length*18);
 let best={x:Math.random()*maxX,y:Math.random()*maxY,score:-Infinity};
 for(let attempt=0;attempt<attempts;attempt++){
  const candidate={x:Math.random()*maxX,y:Math.random()*maxY,score:Infinity};
  for(const other of placed){
   const dx=candidate.x+sprite.size/2-(other.x+other.size/2);
   const dy=candidate.y+sprite.size/2-(other.y+other.size/2);
   const required=(sprite.size+other.size)/2+8;
   candidate.score=Math.min(candidate.score,Math.hypot(dx,dy)-required);
  }
  if(candidate.score>=0)return candidate;
  if(candidate.score>best.score)best=candidate;
 }
 return best;
}

function randomVelocity(){
 const mobile=matchMedia('(max-width:760px)').matches;
 const speed=((mobile?42:58)+Math.random()*(mobile?14:18))*(reduceMotion?.45:1);
 let angle=0;
 for(let attempt=0;attempt<12;attempt++){
  angle=Math.random()*Math.PI*2;
  if(Math.abs(Math.cos(angle))>=.32&&Math.abs(Math.sin(angle))>=.32)break;
 }
 return {vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed};
}

function placeSprites(reset=false){
 const width=Math.max(1,field.clientWidth);
 const height=Math.max(1,field.clientHeight);
 const size=iconSize(sprites.length);
 const placed=[];
 sprites.forEach(sprite=>{
  sprite.size=size;
  sprite.node.style.width=`${size}px`;
  sprite.node.style.height=`${size}px`;
  if(reset||!Number.isFinite(sprite.x)){
   const position=randomSpritePosition(sprite,width,height,placed);
   sprite.x=position.x;
   sprite.y=position.y;
  }else{
   sprite.x=Math.max(0,Math.min(width-size,sprite.x));
   sprite.y=Math.max(0,Math.min(height-size,sprite.y));
  }
  placed.push(sprite);
  sprite.node.style.transform=`translate3d(${sprite.x}px,${sprite.y}px,0)`;
 });
}

function buildSprites(icons){
 sprites=[];
 field.replaceChildren();
 icons.forEach(icon=>{
  const node=document.createElement('img');
  node.className='gameIcon';
  node.src=icon.url;
  node.alt='';
  node.decoding='async';
  node.draggable=false;
  node.addEventListener('error',()=>{
   sprites=sprites.filter(sprite=>sprite.node!==node);
   node.remove();
   placeSprites(false);
  },{once:true});
  field.appendChild(node);
  const velocity=randomVelocity();
  sprites.push({node,x:NaN,y:NaN,vx:velocity.vx,vy:velocity.vy,size:0});
 });
 placeSprites(true);
}

async function loadIcons(){
 let icons=[];
 try{
  const response=await fetch('/api/home-game-icons',{credentials:'same-origin',cache:'no-store'});
  if(!response.ok)throw new Error(String(response.status));
  const data=await response.json();
  icons=Array.isArray(data.icons)?data.icons.filter(item=>item&&item.url):[];
 }catch{
  try{
   const response=await fetch('/api/game-projects',{credentials:'same-origin',cache:'no-store'});
   const data=await response.json();
   icons=(data.projects||[]).filter(item=>item.iconEndpoint).map(item=>({url:item.iconEndpoint}));
  }catch{}
 }
 buildSprites(icons);
}

function resolveCollisions(width,height){
 for(let i=0;i<sprites.length;i++){
  for(let j=i+1;j<sprites.length;j++){
   const first=sprites[i];
   const second=sprites[j];
   const dx=second.x+second.size/2-(first.x+first.size/2);
   const dy=second.y+second.size/2-(first.y+first.size/2);
   const distance=Math.hypot(dx,dy);
   const minimum=(first.size+second.size)/2+5;
   if(distance>=minimum)continue;
   const nx=distance?dx/distance:1;
   const ny=distance?dy/distance:0;
   const separation=(minimum-distance)/2;
   first.x-=nx*separation;
   first.y-=ny*separation;
   second.x+=nx*separation;
   second.y+=ny*separation;
   const closingSpeed=(first.vx-second.vx)*nx+(first.vy-second.vy)*ny;
   if(closingSpeed>0){
    first.vx-=closingSpeed*nx;
    first.vy-=closingSpeed*ny;
    second.vx+=closingSpeed*nx;
    second.vy+=closingSpeed*ny;
   }
   first.x=Math.max(0,Math.min(width-first.size,first.x));
   first.y=Math.max(0,Math.min(height-first.size,first.y));
   second.x=Math.max(0,Math.min(width-second.size,second.x));
   second.y=Math.max(0,Math.min(height-second.size,second.y));
  }
 }
}

function animate(now){
 const elapsed=Math.min(.04,Math.max(0,(now-previousTime)/1000));
 previousTime=now;
 const width=field.clientWidth;
 const height=field.clientHeight;
 sprites.forEach(sprite=>{
  sprite.x+=sprite.vx*elapsed;
  sprite.y+=sprite.vy*elapsed;
  const maxX=Math.max(0,width-sprite.size);
  const maxY=Math.max(0,height-sprite.size);
  if(sprite.x<=0){sprite.x=0;sprite.vx=Math.abs(sprite.vx)}else if(sprite.x>=maxX){sprite.x=maxX;sprite.vx=-Math.abs(sprite.vx)}
  if(sprite.y<=0){sprite.y=0;sprite.vy=Math.abs(sprite.vy)}else if(sprite.y>=maxY){sprite.y=maxY;sprite.vy=-Math.abs(sprite.vy)}
  });
  resolveCollisions(width,height);
  sprites.forEach(sprite=>{
  sprite.node.style.transform=`translate3d(${sprite.x}px,${sprite.y}px,0)`;
 });
 frameId=requestAnimationFrame(animate);
}

new ResizeObserver(()=>placeSprites(false)).observe(field);
document.addEventListener('visibilitychange',()=>{previousTime=performance.now()});
loadIcons().finally(()=>{cancelAnimationFrame(frameId);previousTime=performance.now();frameId=requestAnimationFrame(animate)});
</script>
</body>
</html>
