<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="color-scheme" content="dark">
<title>崩壞：因緣精靈｜遊戲成就紀錄器</title>
<style>
:root{--bg:#071019;--panel:#0d1620;--line:#243445;--text:#eef6fb;--muted:#91a6b8;--a:#62dbc9;--b:#88aaff}
*{box-sizing:border-box}html,body{width:100%;min-height:100%;margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif}
.stage{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 20%,rgba(98,219,201,.12),transparent 35%),#071019}.panel{width:min(620px,100%);display:grid;justify-items:center;gap:18px;padding:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel);text-align:center;box-shadow:0 28px 80px rgba(0,0,0,.36)}.icon{width:120px;height:120px;border-radius:24px;object-fit:cover;border:1px solid rgba(255,255,255,.18);box-shadow:0 18px 48px rgba(0,0,0,.35)}h1{margin:0;font-size:clamp(26px,5vw,42px);letter-spacing:0}.status{padding:9px 12px;border:1px solid rgba(136,170,255,.28);border-radius:8px;background:rgba(136,170,255,.08);color:#c8d6ff;font-weight:900}
</style>
</head>
<body>
<main class="stage">
 <section class="panel">
  
  <h1>崩壞：因緣精靈</h1>
  <div class="status">尚未公測</div>
 </section>
</main>
</body>
</html>
